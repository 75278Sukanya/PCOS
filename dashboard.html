<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Your PCOS space</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Arial,sans-serif;background:#fff5f8;color:#542132}.card{width:min(520px,88vw);padding:36px;border-radius:22px;background:#fff;box-shadow:0 10px 35px #99355628}h1{margin-top:0;color:#993556}button{border:0;border-radius:8px;background:#993556;color:#fff;padding:11px 18px;cursor:pointer}</style></head>
<body><main class="card"><h1 id="welcome">Welcome</h1><p>Your private PCOS Management space is ready. You are signed in securely.</p><button id="logout">Log out</button></main><script>
fetch('/api/auth/me').then(async r => {
  if (!r.ok) return location.replace('login.html');
  location.replace('report-plan.html');
});
document.querySelector('#logout').onclick=async()=>{await fetch('/api/auth/logout',{method:'POST'});location.href='login.html'};
</script></body></html>
